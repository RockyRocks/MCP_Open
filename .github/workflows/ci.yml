name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Linux (GCC)
  # ---------------------------------------------------------------------------
  build-linux-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DUSE_UWS=OFF -DBUILD_CSHARP=OFF -DTEST_FRAMEWORK=GTest

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # Linux (Clang)
  # ---------------------------------------------------------------------------
  build-linux-clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Configure
        run: cmake -S . -B build -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DUSE_UWS=OFF -DBUILD_CSHARP=OFF -DTEST_FRAMEWORK=GTest

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # Windows (MSVC)
  # ---------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DUSE_UWS=OFF -DBUILD_CSHARP=OFF -DTEST_FRAMEWORK=GTest

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

  # ---------------------------------------------------------------------------
  # macOS (Apple Clang)
  # ---------------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DUSE_UWS=OFF -DBUILD_CSHARP=OFF -DTEST_FRAMEWORK=GTest

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # C# Wrapper (Linux + .NET 8)
  # ---------------------------------------------------------------------------
  build-csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Configure
        run: cmake -S . -B build -DUSE_UWS=OFF -DBUILD_CSHARP=ON -DTEST_FRAMEWORK=GTest

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Verify C# output
        run: test -f build/csharp/McpClient.dll
