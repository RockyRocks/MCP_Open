model_list:
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-pro
      api_key: os.environ/GOOGLE_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

# ---------------------------------------------------------------------------
# MCP Servers — expose this server's tools to every LLM through the proxy.
#
# Option A: HTTP transport (default — run `mcp_server` without --stdio)
#   Set the URL to match the port in config/mcp_config.json (default 8080).
#
# Option B: Stdio transport — proxy spawns the process directly.
#   Uncomment the stdio block and set the absolute path to the executable.
# ---------------------------------------------------------------------------
mcp_servers:
  mcp_open:
    # Option A: HTTP (recommended)
    url: "http://localhost:8080"
    transport: "http"
    allow_all_keys: true   # available to every API key / team

  # mcp_open_stdio:
  #   transport: "stdio"
  #   command: "/path/to/build/mcp_server"
  #   args: ["--stdio"]
  #   env:
  #     MCP_API_KEY: os.environ/MCP_API_KEY
  #   allow_all_keys: true
